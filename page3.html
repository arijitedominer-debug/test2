<!DOCTYPE html>

</head>
<body>

  <h1>Page 3</h1>

  <button onclick="goBack()">Back</button>

  <script>
    function goBack() {
      if (history.length > 1) {
        history.back();
      } else {
        window.close();
      }
    }
  </script>

</body>
</html>
